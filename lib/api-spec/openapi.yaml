openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: D&D Adventure Bot API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: game
    description: D&D game state and control
  - name: characters
    description: Character management
  - name: openai
    description: OpenAI AI Dungeon Master operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /game/state:
    get:
      operationId: getGameState
      tags: [game]
      summary: Get current game state
      responses:
        "200":
          description: Current game state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameState"

  /game/start:
    post:
      operationId: startGame
      tags: [game]
      summary: Start the game
      responses:
        "200":
          description: Game started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameState"

  /game/pause:
    post:
      operationId: pauseGame
      tags: [game]
      summary: Pause the game
      responses:
        "200":
          description: Game paused
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameState"

  /game/reset:
    post:
      operationId: resetGame
      tags: [game]
      summary: Reset the game
      responses:
        "200":
          description: Game reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameState"

  /game/narrative:
    get:
      operationId: getNarrative
      tags: [game]
      summary: Get story narrative log
      responses:
        "200":
          description: Narrative entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NarrativeEntry"

  /game/action:
    post:
      operationId: performAction
      tags: [game]
      summary: Perform a player action (streams DM response)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActionRequest"
      responses:
        "200":
          description: SSE stream of DM narrative
          content:
            text/event-stream: {}
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not an active player
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /characters:
    get:
      operationId: listCharacters
      tags: [characters]
      summary: List all characters (active and pending)
      responses:
        "200":
          description: List of characters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Character"

  /characters/create:
    post:
      operationId: createCharacter
      tags: [characters]
      summary: Create a new pending character
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCharacterBody"
      responses:
        "201":
          description: Character created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Character"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /characters/{id}:
    get:
      operationId: getCharacter
      tags: [characters]
      summary: Get character details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Character details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Character"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteCharacter
      tags: [characters]
      summary: Remove a character
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /characters/{id}/activate:
    post:
      operationId: activateCharacter
      tags: [characters]
      summary: Activate a pending character (add to party)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Character activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Character"
        "400":
          description: Party full or already active
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /characters/{id}/deactivate:
    post:
      operationId: deactivateCharacter
      tags: [characters]
      summary: Deactivate an active character (move to pending)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Character deactivated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Character"

  /characters/{id}/award-xp:
    post:
      operationId: awardXp
      tags: [characters]
      summary: Award XP to a character
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AwardXpBody"
      responses:
        "200":
          description: XP awarded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Character"

  /game/generate-dm-name:
    post:
      operationId: generateDmName
      tags: [game]
      summary: Generate a unique DM name via AI
      responses:
        "200":
          description: Generated DM name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DmNameResponse"

  /campaigns:
    get:
      operationId: listCampaigns
      tags: [game]
      summary: List all saved campaigns
      responses:
        "200":
          description: List of saved campaigns
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Campaign"
    post:
      operationId: saveCampaign
      tags: [game]
      summary: Save the current campaign state
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveCampaignBody"
      responses:
        "201":
          description: Campaign saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"

  /campaigns/{id}:
    get:
      operationId: getCampaign
      tags: [game]
      summary: Get a specific campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Campaign details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteCampaign
      tags: [game]
      summary: Delete a saved campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /campaigns/{id}/load:
    post:
      operationId: loadCampaign
      tags: [game]
      summary: Load a saved campaign (restores full game state)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Campaign loaded successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameState"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /openai/conversations:
    get:
      operationId: listOpenaiConversations
      tags: [openai]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiConversation"
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOpenaiConversationBody"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"

  /openai/conversations/{id}:
    get:
      operationId: getOpenaiConversation
      tags: [openai]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
    delete:
      operationId: deleteOpenaiConversation
      tags: [openai]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"

  /openai/conversations/{id}/messages:
    get:
      operationId: listOpenaiMessages
      tags: [openai]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiMessage"
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send a text message and receive a streaming text response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendOpenaiMessageBody"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    GameState:
      type: object
      properties:
        status:
          type: string
          enum: [idle, active, paused]
        activeCharacterIds:
          type: array
          items:
            type: integer
        storyContext:
          type: ["string", "null"]
        dmName:
          type: ["string", "null"]
        updatedAt:
          type: string
          format: date-time
      required:
        - status
        - activeCharacterIds
        - updatedAt

    NarrativeEntry:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [dm, player, system]
        username:
          type: ["string", "null"]
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - type
        - content
        - createdAt

    ActionRequest:
      type: object
      properties:
        username:
          type: string
        action:
          type: string
      required:
        - username
        - action

    Character:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        name:
          type: string
        race:
          type: string
        class:
          type: string
        status:
          type: string
          enum: [pending, active]
        level:
          type: integer
        xp:
          type: integer
        hp:
          type: integer
        maxHp:
          type: integer
        strength:
          type: integer
        dexterity:
          type: integer
        constitution:
          type: integer
        intelligence:
          type: integer
        wisdom:
          type: integer
        charisma:
          type: integer
        subChoice:
          type: ["string", "null"]
        inventory:
          type: array
          items:
            type: string
        skills:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - username
        - name
        - race
        - class
        - status
        - level
        - xp
        - hp
        - maxHp
        - strength
        - dexterity
        - constitution
        - intelligence
        - wisdom
        - charisma
        - inventory
        - skills
        - createdAt

    CreateCharacterBody:
      type: object
      properties:
        username:
          type: string
        name:
          type: string
        race:
          type: string
        class:
          type: string
        subChoice:
          type: string
      required:
        - username
        - name
        - race
        - class

    AwardXpBody:
      type: object
      properties:
        amount:
          type: integer
      required:
        - amount

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    OpenaiConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt

    OpenaiMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt

    CreateOpenaiConversationBody:
      type: object
      properties:
        title:
          type: string
      required:
        - title

    SendOpenaiMessageBody:
      type: object
      properties:
        content:
          type: string
      required:
        - content

    OpenaiConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/OpenaiMessage"
      required:
        - id
        - title
        - createdAt
        - messages

    OpenaiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    DmNameResponse:
      type: object
      properties:
        dmName:
          type: string
      required:
        - dmName

    Campaign:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        dmName:
          type: string
        gameStatus:
          type: string
        storyContext:
          type: ["string", "null"]
        narrativeJson:
          type: string
        charactersJson:
          type: string
        savedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - dmName
        - gameStatus
        - narrativeJson
        - charactersJson
        - savedAt

    SaveCampaignBody:
      type: object
      properties:
        name:
          type: string
      required:
        - name
